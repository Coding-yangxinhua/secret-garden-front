<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="src/assets/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover"
    />
    <title>莳花小助手</title>
    <!-- 预解析后端域名，减少 DNS 查询时间 -->
    <link rel="preload" href="/src/assets/main.css" as="style" />
    <!-- 添加首屏 loading 样式，防止白屏 -->
    <style>
      /* 首屏加载提示 - JS 还没下载完时显示 */
      #app-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(170deg, #fef6f9 0%, #fdf1f5 30%, #faf0f4 60%, #f8f4f7 100%);
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #app-loading .loading-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(236, 72, 153, 0.15);
        border-top-color: #ec4899;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #app-loading .loading-text {
        margin-top: 16px;
        font-size: 14px;
        color: #ec4899;
        font-weight: 500;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- 首屏 loading - Vue 挂载后会被替换 -->
    <div id="app-loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">加载中...</div>
    </div>
    <div id="app" style="display: none"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      // Vue 挂载后隐藏 loading（通过监视 #app 是否有子节点）
      const observer = new MutationObserver(function () {
        const app = document.getElementById('app')
        if (app && app.childNodes.length > 0) {
          app.style.display = ''
          const loading = document.getElementById('app-loading')
          if (loading) {
            loading.style.opacity = '0'
            setTimeout(function () {
              loading.remove()
            }, 300)
          }
          observer.disconnect()
        }
      })
      observer.observe(document.getElementById('app'), { childList: true, subtree: true })
      // 兜底：10秒后无论是否加载完都隐藏 loading
      setTimeout(function () {
        const loading = document.getElementById('app-loading')
        if (loading) {
          loading.style.opacity = '0'
          setTimeout(function () {
            loading.remove()
          }, 300)
        }
        document.getElementById('app').style.display = ''
        observer.disconnect()
      }, 10000)
    </script>
  </body>
</html>
